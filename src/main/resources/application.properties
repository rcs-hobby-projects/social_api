spring.application.name=social-api

spring.datasource.url=jdbc:postgresql://localhost:5432/socialapi
spring.datasource.username=socialapi_user
spring.datasource.password=socialapi_pass

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration